name: Atualizar planilha de leilões

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *' # roda a cada hora
  workflow_dispatch:

jobs:
  update-spreadsheet:
    name: Atualizar Google Sheets
    runs-on: ubuntu-latest
    env:
      GOOGLE_WORKSHEET_NAME: "Leilões"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Create .env for GitHub Actions
        run: |
          cat > .env <<'EOF'
          GOOGLE_SHEETS_CREDENTIALS_JSON=${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
          GOOGLE_SPREADSHEET_ID=${{ secrets.GOOGLE_SPREADSHEET_ID }}
          GOOGLE_WORKSHEET_NAME=${{ env.GOOGLE_WORKSHEET_NAME }}
          CRON_SECRET=${{ secrets.CRON_SECRET }}
          EOF

      - name: Run scraper and update planilha
        run: python scripts/sync_once.py
